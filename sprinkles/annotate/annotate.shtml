<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Annotate</title>
  <link rel="icon" href="pencil" />
  <style>
    :root { color-scheme: light dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: light-dark(#f0f0f5, #1a1a2e);
    }
    #canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      cursor: crosshair;
    }
    #empty-state {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10; pointer-events: none;
      color: var(--s2-content-secondary, light-dark(#666, rgba(255,255,255,0.7)));
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      gap: 24px;
    }
    #empty-state .icon-row {
      display: flex; gap: 48px; align-items: center;
      flex-wrap: wrap; justify-content: center; padding: 0 16px;
    }
    #empty-state .option {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      opacity: 0.85;
    }
    #empty-state .option svg {
      width: 48px; height: 48px;
      stroke: var(--s2-content-secondary, light-dark(#888, rgba(255,255,255,0.6)));
      fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }
    #empty-state .option .label {
      font-size: 14px;
      color: var(--s2-content-secondary, light-dark(#666, rgba(255,255,255,0.55)));
      text-align: center;
    }
    #empty-state .option .shortcut {
      font-size: 12px;
      color: var(--s2-content-secondary, light-dark(#999, rgba(255,255,255,0.35)));
      background: light-dark(rgba(0,0,0,0.06), rgba(255,255,255,0.08));
      border-radius: 4px; padding: 2px 8px;
    }
    #empty-state .divider-text {
      font-size: 13px;
      color: var(--s2-content-secondary, light-dark(#999, rgba(255,255,255,0.35)));
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    #text-input {
      position: absolute; display: none; z-index: 2147483646;
      background: transparent; border: 2px dashed currentColor;
      color: inherit; font: 16px sans-serif; padding: 2px 4px;
      outline: none; min-width: 100px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="empty-state">
    <div class="icon-row">
      <div class="option">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><circle cx="12" cy="10" r="1" fill="currentColor"/></svg>
        <div class="label">Capture screenshot</div>
        <div class="shortcut">Click "Screenshot" above</div>
      </div>
      <div class="divider-text">or</div>
      <div class="option">
        <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
        <div class="label">Paste an image</div>
        <div class="shortcut">⌘V / Ctrl+V</div>
      </div>
    </div>
  </div>
  <input id="text-input" type="text" />
  <script>
  (function() {
    'use strict';

    // --- Lick dedup ---
    var lastLick = {};
    function safeLick(payload) {
      var key = payload.action;
      var now = Date.now();
      if (lastLick[key] && now - lastLick[key] < 2000) return;
      lastLick[key] = now;
      slicc.lick(payload);
    }

    // --- Toolbar (Shadow DOM) ---
    var toolbarHost = document.createElement('div');
    toolbarHost.id = 'toolbar-host';
    document.body.appendChild(toolbarHost);
    var shadow = toolbarHost.attachShadow({ mode: 'open' });
    shadow.innerHTML = `
      <style>
        :host {
          position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
          z-index: 2147483647; pointer-events: auto;
          max-width: calc(100vw - 16px);
        }
        .toolbar {
          display: flex; flex-wrap: wrap; align-items: center;
          justify-content: center; gap: 4px; padding: 6px 10px;
          background: light-dark(rgba(240,240,245,0.92), rgba(30,30,50,0.92));
          backdrop-filter: blur(12px);
          border-radius: var(--s2-radius-default, 12px);
          box-shadow: 0 4px 24px light-dark(rgba(0,0,0,0.12), rgba(0,0,0,0.4));
          font: 12px/1 -apple-system, BlinkMacSystemFont, sans-serif;
          color: var(--s2-content-default, light-dark(#1a1a1a, #e0e0e0));
        }
        .row {
          display: flex; align-items: center; gap: 4px;
          flex-wrap: nowrap;
        }
        button {
          display: flex; align-items: center; justify-content: center;
          height: 28px; min-width: 28px; padding: 0 8px;
          border: 1px solid light-dark(rgba(0,0,0,0.12), rgba(255,255,255,0.15));
          border-radius: var(--s2-radius-pill, 9999px);
          background: transparent;
          color: var(--s2-content-default, light-dark(#1a1a1a, #e0e0e0));
          cursor: pointer; font: inherit; transition: all 0.15s;
        }
        button:hover {
          background: light-dark(rgba(0,0,0,0.06), rgba(255,255,255,0.1));
        }
        button.active {
          background: color-mix(in srgb, var(--s2-accent, #6366f1) 20%, transparent);
          border-color: var(--s2-accent, #6366f1);
          color: var(--s2-accent, #6366f1);
        }
        button.primary {
          background: var(--s2-accent, #6366f1);
          border-color: var(--s2-accent, #6366f1);
          color: #fff; font-weight: 600;
        }
        button.primary:hover {
          background: color-mix(in srgb, var(--s2-accent, #6366f1) 85%, #000);
        }
        button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
        button.close {
          border-color: light-dark(rgba(220,38,38,0.3), rgba(239,68,68,0.4));
          color: light-dark(#dc2626, #fca5a5);
        }
        button.close:hover {
          background: light-dark(rgba(220,38,38,0.08), rgba(239,68,68,0.15));
        }
        .sep {
          width: 1px; height: 18px;
          background: light-dark(rgba(0,0,0,0.12), rgba(255,255,255,0.15));
          margin: 0 2px;
        }
        .swatch {
          width: 18px; height: 18px; border-radius: 50%;
          border: 2px solid transparent;
          cursor: pointer; transition: border-color 0.15s;
        }
        .swatch.active {
          border-color: light-dark(#333, #fff);
        }
        svg {
          width: 14px; height: 14px; fill: none; stroke: currentColor;
          stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        /* Narrow layout: two rows */
        @container (max-width: 480px) {
          .toolbar { gap: 4px; }
        }
      </style>
      <div class="toolbar">
        <div class="row">
          <button data-tool="pencil" class="active" title="Pencil (1)">
            <svg viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
          </button>
          <button data-tool="highlighter" title="Highlighter (2)">
            <svg viewBox="0 0 24 24"><path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
          </button>
          <button data-tool="rectangle" title="Rectangle (3)">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          </button>
          <button data-tool="ellipse" title="Ellipse (4)">
            <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="10" ry="8"/></svg>
          </button>
          <button data-tool="arrow" title="Arrow (5)">
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
          <button data-tool="text" title="Text (6)">
            <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          </button>
          <div class="sep"></div>
          <div class="swatch active" data-color="#ef4444" style="background:#ef4444" title="Red"></div>
          <div class="swatch" data-color="#3b82f6" style="background:#3b82f6" title="Blue"></div>
          <div class="swatch" data-color="#22c55e" style="background:#22c55e" title="Green"></div>
          <div class="swatch" data-color="#eab308" style="background:#eab308" title="Yellow"></div>
          <div class="swatch" data-color="#ffffff" style="background:#ffffff; border-color: light-dark(#ccc, transparent)" title="White"></div>
          <div class="swatch" data-color="#000000" style="background:#000000; border-color: light-dark(transparent, rgba(255,255,255,0.3))" title="Black"></div>
        </div>
        <div class="row">
          <button data-action="undo" title="Undo (Ctrl+Z)">
            <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <button data-action="clear" title="Clear all">
            <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          </button>
          <div class="sep"></div>
          <button data-action="screenshot" class="primary" title="New Screenshot">
            <svg viewBox="0 0 24 24" style="margin-right:3px"><rect x="2" y="3" width="20" height="14" rx="2"/><circle cx="12" cy="10" r="2"/></svg>
            Shot
          </button>
          <button data-action="attach" class="primary" title="Attach to Chat">
            <svg viewBox="0 0 24 24" style="margin-right:3px"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            Attach
          </button>
          <button data-action="close" class="close" title="Close (Esc)">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    `;

    // --- Constants and state ---
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    var textInput = document.getElementById('text-input');
    var dpr = window.devicePixelRatio || 1;

    var baseImage = null;
    var strokes = [];
    var currentStroke = null;
    var currentTool = 'pencil';
    var currentColor = '#ef4444';
    var isDrawing = false;

    // --- Canvas sizing ---
    function resizeCanvas() {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      redraw();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- Redraw ---
    function redraw() {
      ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

      if (baseImage) {
        var scale = Math.min(
          (canvas.width / dpr) / baseImage.naturalWidth,
          (canvas.height / dpr) / baseImage.naturalHeight
        );
        var w = baseImage.naturalWidth * scale;
        var h = baseImage.naturalHeight * scale;
        var x = ((canvas.width / dpr) - w) / 2;
        var y = ((canvas.height / dpr) - h) / 2;
        ctx.drawImage(baseImage, x, y, w, h);
      }

      for (var i = 0; i < strokes.length; i++) {
        drawStroke(strokes[i]);
      }

      if (currentStroke) {
        drawStroke(currentStroke);
      }
    }

    // --- Draw stroke ---
    function drawStroke(s) {
      ctx.save();
      ctx.strokeStyle = s.color;
      ctx.fillStyle = s.color;
      ctx.lineWidth = s.lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.globalAlpha = s.opacity;

      switch (s.tool) {
        case 'pencil':
        case 'highlighter':
          if (s.points && s.points.length > 1) {
            ctx.beginPath();
            ctx.moveTo(s.points[0].x, s.points[0].y);
            for (var i = 1; i < s.points.length; i++) {
              ctx.lineTo(s.points[i].x, s.points[i].y);
            }
            ctx.stroke();
          }
          break;

        case 'rectangle':
          if (s.rect) {
            ctx.strokeRect(s.rect.x, s.rect.y, s.rect.w, s.rect.h);
          }
          break;

        case 'ellipse':
          if (s.rect) {
            var cx = s.rect.x + s.rect.w / 2;
            var cy = s.rect.y + s.rect.h / 2;
            var rx = Math.abs(s.rect.w / 2);
            var ry = Math.abs(s.rect.h / 2);
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
            ctx.stroke();
          }
          break;

        case 'arrow':
          if (s.start && s.end) {
            ctx.beginPath();
            ctx.moveTo(s.start.x, s.start.y);
            ctx.lineTo(s.end.x, s.end.y);
            ctx.stroke();
            var angle = Math.atan2(s.end.y - s.start.y, s.end.x - s.start.x);
            var headLen = Math.max(12, s.lineWidth * 4);
            ctx.beginPath();
            ctx.moveTo(s.end.x, s.end.y);
            ctx.lineTo(s.end.x - headLen * Math.cos(angle - Math.PI / 6),
                       s.end.y - headLen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(s.end.x, s.end.y);
            ctx.lineTo(s.end.x - headLen * Math.cos(angle + Math.PI / 6),
                       s.end.y - headLen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
          }
          break;

        case 'text':
          if (s.text && s.position) {
            ctx.font = s.lineWidth * 5 + 'px sans-serif';
            ctx.fillText(s.text, s.position.x, s.position.y);
          }
          break;
      }
      ctx.restore();
    }

    // --- Pointer events ---
    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    canvas.addEventListener('pointerdown', function(e) {
      if (currentTool === 'text') {
        showTextInput(e);
        return;
      }
      isDrawing = true;
      var pos = getPos(e);
      var lineWidth = currentTool === 'highlighter' ? 20 : 3;
      var opacity = currentTool === 'highlighter' ? 0.4 : 1;

      currentStroke = {
        tool: currentTool,
        color: currentColor,
        lineWidth: lineWidth,
        opacity: opacity
      };

      if (currentTool === 'pencil' || currentTool === 'highlighter') {
        currentStroke.points = [pos];
      } else if (currentTool === 'rectangle' || currentTool === 'ellipse') {
        currentStroke.rect = { x: pos.x, y: pos.y, w: 0, h: 0 };
        currentStroke._startPos = pos;
      } else if (currentTool === 'arrow') {
        currentStroke.start = pos;
        currentStroke.end = pos;
      }
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointermove', function(e) {
      if (!isDrawing || !currentStroke) return;
      var pos = getPos(e);

      if (currentTool === 'pencil' || currentTool === 'highlighter') {
        currentStroke.points.push(pos);
      } else if (currentTool === 'rectangle' || currentTool === 'ellipse') {
        currentStroke.rect.w = pos.x - currentStroke._startPos.x;
        currentStroke.rect.h = pos.y - currentStroke._startPos.y;
      } else if (currentTool === 'arrow') {
        currentStroke.end = pos;
      }
      redraw();
    });

    canvas.addEventListener('pointerup', function(e) {
      if (!isDrawing || !currentStroke) return;
      isDrawing = false;
      delete currentStroke._startPos;
      strokes.push(currentStroke);
      currentStroke = null;
      redraw();
    });

    // --- Text tool ---
    function showTextInput(e) {
      var pos = getPos(e);
      textInput.style.display = 'block';
      textInput.style.left = pos.x + 'px';
      textInput.style.top = pos.y + 'px';
      textInput.style.color = currentColor;
      textInput.value = '';
      textInput.focus();
      textInput._pos = pos;
    }

    textInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (textInput.value.trim()) {
          strokes.push({
            tool: 'text',
            color: currentColor,
            lineWidth: 3,
            opacity: 1,
            text: textInput.value,
            position: textInput._pos
          });
          redraw();
        }
        textInput.style.display = 'none';
      } else if (e.key === 'Escape') {
        textInput.style.display = 'none';
      }
    });

    // --- Toolbar event wiring ---
    shadow.querySelectorAll('[data-tool]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        shadow.querySelectorAll('[data-tool]').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentTool = btn.dataset.tool;
      });
    });

    shadow.querySelectorAll('.swatch').forEach(function(sw) {
      sw.addEventListener('click', function() {
        shadow.querySelectorAll('.swatch').forEach(function(s) { s.classList.remove('active'); });
        sw.classList.add('active');
        currentColor = sw.dataset.color;
      });
    });

    shadow.querySelector('[data-action="undo"]').addEventListener('click', function() {
      strokes.pop();
      redraw();
    });

    shadow.querySelector('[data-action="clear"]').addEventListener('click', function() {
      strokes = [];
      currentStroke = null;
      redraw();
    });

    // Screenshot button — capture directly via slicc.captureScreen() (no round-trip)
    var screenshotBtn = shadow.querySelector('[data-action="screenshot"]');
    screenshotBtn.addEventListener('click', function() {
      if (typeof slicc.captureScreen === 'function') {
        screenshotBtn.disabled = true;
        screenshotBtn.textContent = 'Capturing…';
        slicc.captureScreen().then(function(shot) {
          var dataUrl = 'data:' + shot.mimeType + ';base64,' + shot.base64;
          loadBaseImage(dataUrl);
          screenshotBtn.disabled = false;
          screenshotBtn.textContent = 'Screenshot';
        }).catch(function() {
          // User cancelled or unavailable — fall back to lick
          screenshotBtn.disabled = false;
          screenshotBtn.textContent = 'Screenshot';
          safeLick({ action: 'request-screenshot' });
        });
      } else {
        // Fallback for older runtimes
        safeLick({ action: 'request-screenshot' });
      }
    });

    // Attach to Chat — composites base + annotations, attaches via slicc.attachImage
    var attachBtn = shadow.querySelector('[data-action="attach"]');
    attachBtn.addEventListener('click', function() {
      if (!baseImage) return;
      attachBtn.disabled = true;
      var dataUrl = getCompositeDataUrl();
      if (typeof slicc.attachImage === 'function') {
        var b64 = dataUrl.replace(/^data:image\/[^;]+;base64,/, '');
        slicc.attachImage(b64, 'annotation.jpg', 'image/jpeg');
      } else {
        safeLick({ action: 'capture', dataUrl: dataUrl });
      }
      setTimeout(function() { attachBtn.disabled = false; }, 2000);
      setTimeout(function() {
        if (typeof slicc.minimize === 'function') {
          slicc.minimize();
        } else {
          slicc.close();
        }
      }, 500);
    });

    shadow.querySelector('[data-action="close"]').addEventListener('click', function() {
      safeLick({ action: 'close' });
      slicc.close();
    });

    // --- Get composite as data URL ---
    function getCompositeDataUrl() {
      var srcW = canvas.width / dpr;
      var srcH = canvas.height / dpr;
      var maxEdge = 1568;
      var scale = 1;
      if (Math.max(srcW, srcH) > maxEdge) {
        scale = maxEdge / Math.max(srcW, srcH);
      }
      var outW = Math.round(srcW * scale);
      var outH = Math.round(srcH * scale);

      var offscreen = document.createElement('canvas');
      offscreen.width = outW;
      offscreen.height = outH;
      var octx = offscreen.getContext('2d');
      octx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, outW, outH);

      var quality = 0.85;
      var dataUrl = offscreen.toDataURL('image/jpeg', quality);

      while (dataUrl.length > 5 * 1024 * 1024 * 1.37 && quality > 0.3) {
        quality -= 0.1;
        dataUrl = offscreen.toDataURL('image/jpeg', quality);
      }
      return dataUrl;
    }

    // --- Receive base image ---
    var emptyState = document.getElementById('empty-state');
    function loadBaseImage(dataUrl) {
      var img = new Image();
      img.onload = function() {
        baseImage = img;
        if (emptyState) emptyState.style.display = 'none';
        redraw();
      };
      img.src = dataUrl;
    }

    slicc.on('update', function(data) {
      var src = data.baseImage || data.dataUrl || (data.action === 'load-image' && data.dataUrl);
      if (src) {
        loadBaseImage(src);
      } else if (data.reload) {
        loadBaseFromFile();
      }
    });

    // --- Clipboard paste support (Cmd+V / Ctrl+V) ---
    document.addEventListener('paste', function(e) {
      var items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
          e.preventDefault();
          var blob = items[i].getAsFile();
          var reader = new FileReader();
          reader.onload = function(ev) {
            loadBaseImage(ev.target.result);
          };
          reader.readAsDataURL(blob);
          return;
        }
      }
    });

    // --- Load base image from VFS file ---
    function loadBaseFromFile() {
      slicc.readFile('/shared/annotate-base.jpg').then(function(data) {
        if (data && data.length > 100) {
          var src = data.indexOf('data:') === 0 ? data : 'data:image/jpeg;base64,' + data;
          loadBaseImage(src);
        } else {
          safeLick({ action: 'request-screenshot' });
        }
      }).catch(function() {
        safeLick({ action: 'request-screenshot' });
      });
    }

    // --- Check for existing base image on load (don't auto-request) ---
    setTimeout(function() {
      slicc.readFile('/shared/annotate-base.jpg').then(function(data) {
        if (data && data.length > 100) {
          var src = data.indexOf('data:') === 0 ? data : 'data:image/jpeg;base64,' + data;
          loadBaseImage(src);
        }
      }).catch(function() {
        // No file, show empty state
      });
    }, 300);

    // --- Keyboard shortcuts ---
    function selectTool(tool) {
      currentTool = tool;
      shadow.querySelectorAll('[data-tool]').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tool === tool);
      });
    }

    document.addEventListener('keydown', function(e) {
      if (textInput.style.display !== 'none' && document.activeElement === textInput) return;

      if (e.key === 'Escape') {
        safeLick({ action: 'close' });
        slicc.close();
      } else if (e.key === '1') { selectTool('pencil'); }
      else if (e.key === '2') { selectTool('highlighter'); }
      else if (e.key === '3') { selectTool('rectangle'); }
      else if (e.key === '4') { selectTool('ellipse'); }
      else if (e.key === '5') { selectTool('arrow'); }
      else if (e.key === '6') { selectTool('text'); }
      else if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        strokes.pop();
        redraw();
      }
    });

  })();
  </script>
</body>
</html>
